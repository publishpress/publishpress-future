name: Deploy plugin to WordPress.org
permissions:
  contents: write

on:
  release:
    types: [ released ]

  workflow_dispatch:
    inputs:
      tmate_enabled:
        type: boolean
        description: 'Enable "tmate" for debugging'
        required: false
        default: false

jobs:
  code-check:
    name: Check the code
    uses: ./.github/workflows/code-check.yml
    secrets: inherit

  code-test:
    name: Test the code
    uses: ./.github/workflows/code-test.yml
    secrets: inherit

  deploy-wp-org:
    name: Deploy the new tag
    needs: [code-check, code-test]
    runs-on: ubuntu-latest
    steps:
      - name: Install linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2 subversion

      - name: Setup tmate session for Debugging, if inputs.tmate_enabled is true
        uses: mxschmitt/action-tmate@v3
        if: ${{ inputs.tmate_enabled }}
        timeout-minutes: 10
        with:
          detached: true

      - name: Checkout code
        uses: actions/checkout@master

      - name: Create .env file
        run: |
          cp $GITHUB_WORKSPACE/.env.example $GITHUB_WORKSPACE/.env

      - name: Fix permissions
        run: |
          chmod +x $GITHUB_WORKSPACE/dev-workspace/run
          chmod +x $GITHUB_WORKSPACE/dev-workspace/scripts/*.sh

      - name: Prepare composer
        run: |
          $GITHUB_WORKSPACE/dev-workspace/run composer validate
          $GITHUB_WORKSPACE/dev-workspace/run composer install

      - name: Show version of tools inside the dev-workspace
        run: |
          $GITHUB_WORKSPACE/dev-workspace/run composer info:versions

      - name: Build the package using ./dev-workspace
        run: |
          $GITHUB_WORKSPACE/dev-workspace/run composer build

      - name: WordPress.org plugin deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: post-expirator
          BUILD_DIR: ${{ github.workspace }}/dist/post-expirator

      - name: Get the plugin version number
        id: get-version
        run: |
          VERSION=$($GITHUB_WORKSPACE/dev-workspace/run pversion | tail -n 1 | tr -d '\n\r' | xargs)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            "${{ github.workspace }}/dist/publishpress-future-${{ steps.get-version.outputs.version }}.zip" \
            --clobber
