name: Unit and Integration Tests
permissions:
  contents: read
on:
  push:
    branches:
      - 'main'
      - 'release/*'
      - 'release-*'
      - 'hotfix/github-workflow'

  pull_request:
    branches:
      - '*'

  workflow_call:

  workflow_dispatch:

jobs:
  check:
    name: Test the code
    runs-on: [self-hosted, pretest]
    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create root .env from template
        run: |
          cp $GITHUB_WORKSPACE/.env.example $GITHUB_WORKSPACE/.env

      - name: Validate composer.json
        run: composer validate

      - name: Install Composer dependencies
        run: composer install

      - name: Show dev-workspace tool versions
        run: composer info:version

      - name: Add dev-workspace scripts to PATH
        run: echo "$DEV_SCRIPTS_DIR" >> "$GITHUB_PATH"

      - name: Run Unit Tests
        run: |
          composer test Unit
