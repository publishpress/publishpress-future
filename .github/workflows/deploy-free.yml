name: Deploy plugin to WordPress.org
on:
  release:
    types: [ released ]

jobs:
  code-check:
    name: Check the code
    uses: ./.github/workflows/code-check.yml
    secrets: inherit

  deploy-wp-org:
    uses: publishpress/github-workflows/.github/workflows/deploy-free.yml@v1.0.0
    needs: [code-check]
