name: VIP Scans and other code checks
permissions:
  contents: read
on:
  push:
    branches:
      - 'main'
      - 'hotfix/github-workflow'

  pull_request:
    branches:
      - '*'

  workflow_call:

  workflow_dispatch:

env:
  DEV_SCRIPTS_DIR: ${{ github.workspace }}/vendor/publishpress/dev-workspace/scripts

jobs:
  check:
    name: Check the code
    runs-on: [self-hosted, precheck]
    steps:
      - name: Checkout repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create root .env from template
        run: |
          cp $GITHUB_WORKSPACE/.env.example $GITHUB_WORKSPACE/.env

      - name: Validate composer.json
        run: composer validate

      - name: Install Composer dependencies
        run: composer install

      - name: Show dev-workspace tool versions
        run: composer info:version

      - name: Add dev-workspace scripts to PATH
        run: echo "$DEV_SCRIPTS_DIR" >> "$GITHUB_PATH"

      - name: Run PHP compatibility check
        run: |
          composer check:php

      - name: Run PHP lint check
        run: |
          composer lint:php

      - name: Run PHPCS lint check
        run: |
          composer lint:phpcs
