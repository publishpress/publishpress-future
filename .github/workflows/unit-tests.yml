name: Unit and Integration Tests
permissions:
  contents: read
on:
  push:
    branches:
      - 'main'
      - 'release/*'
      - 'release-*'
      - 'hotfix/github-workflow'

  pull_request:
    branches:
      - '*'

  workflow_call:

  workflow_dispatch:

jobs:
  check:
    uses: publishpress/github-workflows/.github/workflows/unit-tests.yml@development
